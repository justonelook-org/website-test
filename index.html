<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Just One Look</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: #222;
}

.page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 35px 30px;
}

/* Header inspired by old site */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 35px;
    margin-bottom: 25px;
}

.picture-placeholder {
    width: 130px;
    height: 130px;
    border: 2px dashed #9bbbd0;
    color: #6d8ba0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
}

.header-text {
    text-align: left;
}

.site-title {
    font-size: 3rem;
    letter-spacing: 4px;
    color: #0b3d5c;
    font-weight: bold;
    margin: 0;
}

.tagline {
    font-size: 1.1rem;
    font-style: italic;
    margin-top: 8px;
}

/* Blue bar */
.blue-bar {
    height: 48px;
    background: #0788c9;
    border-radius: 4px;
    margin-bottom: 110px;
}

/* Main V-model invitation */
.main-invitation {
    text-align: center;
    min-height: 300px;
}

.main-invitation h2 {
    font-size: 4rem;
    font-weight: normal;
    margin-bottom: 20px;
}

.main-invitation a {
    font-size: 1.7rem;
    text-decoration: none;
    color: #1f5f9f;
}

/* Footer */
.footer {
    text-align: center;
    font-size: 0.9rem;
    margin-top: 100px;
}

.footer a {
    color: #1f5f9f;
    text-decoration: none;
    margin: 0 10px;
}

/* Mobile adjustment */
@media (max-width: 700px) {
    .header {
        flex-direction: column;
        gap: 20px;
    }

    .header-text {
        text-align: center;
    }

    .site-title {
        font-size: 2.2rem;
    }

    .main-invitation h2 {
        font-size: 3rem;
    }
}
</style>
</head>

<body>

<div class="page">

    <header class="header">
        <div class="picture-placeholder">
            Picture
        </div>

        <div class="header-text">
            <h1 class="site-title">JUST ONE LOOK</h1>
            <div class="tagline">
                the purpose of our work is to rid humanity of the fear of life, one person at a time
            </div>
        </div>
    </header>

    <div class="blue-bar"></div>

    <main class="main-invitation">
        <h2>Look at Yourself</h2>

        <p>
            <a href="https://chatgpt.com/g/g-69e2310032ec8191a886a5811372695c-look-at-yourself">
                Try it.
            </a>
        </p>
    </main>

    <footer class="footer">
        <a href="#">About</a>
        <a href="#">FAQ</a>
        <a href="#">Resources</a>
        <a href="#">Downloads</a>
        <a href="#">Step 2</a>
    </footer>

</div>

</body>
</html>
