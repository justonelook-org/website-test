<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Just One Look</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: #222;
}

.page {
    max-width: 1000px;
    margin: 0 auto;
    padding: 15px 20px;
}

/* Header */

.header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 18px;
    margin-bottom: 0;
}

.logo {
    width: 105px;
    height: auto;
}

.header-text {
    text-align: left;
}

.site-title {
    font-size: 2.35rem;
    letter-spacing: 2px;
    color: #0b3d5c;
    font-weight: bold;
    margin: 0;
}

.tagline {
    font-size: 0.9rem;
    font-style: italic;
    margin-top: 5px;
    max-width: 650px;
}

/* Blue bar */

.blue-bar {
    height: 30px;
    background: #0788c9;
    border-radius: 3px;
    margin-top: 2px;
    margin-bottom: 18px;
}

/* Main invitation */

.main-invitation {
    text-align: center;
    min-height: 110px;
}

.main-invitation h2 {
    font-size: 1.9rem;
    font-weight: normal;
    margin-bottom: 10px;
}

.main-invitation a {
    font-size: 1.1rem;
    font-weight: bold;
    text-decoration: none;
    color: #1f5f9f;
}

/* Footer */

.footer {
    text-align: center;
    font-size: 0.8rem;
    margin-top: 15px;
}

.footer a {
    color: #1f5f9f;
    text-decoration: none;
    margin: 0 8px;
}

/* Mobile */

@media (max-width: 700px) {

    .header {
        flex-direction: column;
        text-align: center;
        gap: 8px;
    }

    .header-text {
        text-align: center;
    }

    .logo {
        width: 90px;
    }

    .site-title {
        font-size: 1.7rem;
    }

    .blue-bar {
        margin-top: 8px;
    }

    .main-invitation h2 {
        font-size: 1.6rem;
    }
}

</style>
</head>

<body>

<div class="page">

    <header class="header">

        <img class="logo"
             src="JOL-LOGO.jpg"
             alt="Just One Look">

        <div class="header-text">

            <h1 class="site-title">
                JUST ONE LOOK
            </h1>

            <div class="tagline">
                the purpose of our work is to rid humanity of the fear of life, one person at a time
            </div>

        </div>

    </header>

    <div class="blue-bar"></div>

    <main class="main-invitation">

        <h2>Look at Yourself</h2>

        <p>
            <a href="https://chatgpt.com/g/g-69e2310032ec8191a886a5811372695c-look-at-yourself">
                Try it.
            </a>
        </p>

    </main>

    <footer class="footer">

        <a href="#">About</a>
        <a href="#">FAQ</a>
        <a href="#">Resources</a>
        <a href="#">Downloads</a>
        <a href="#">Step 2</a>

    </footer>

</div>

</body>
</html>
